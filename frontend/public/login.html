<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shukhi Life – Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1a7a3c;
      --green-dark: #125a2b;
      --green-light: #e8f5ee;
      --accent: #f0a500;
      --border: #d4edd9;
      --red: #e53935;
    }
    body {
      font-family: 'Hind Siliguri', sans-serif;
      background: linear-gradient(135deg, #1a3a26 0%, #2d9e52 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo-text {
      font-size: 28px;
      font-weight: 700;
      color: var(--green);
      letter-spacing: -0.5px;
    }
    .login-logo-text span { color: var(--accent); }
    .login-logo-sub { font-size: 13px; color: #888; margin-top: 4px; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 14px; font-weight: 600; color: #333; margin-bottom: 8px; }
    .form-input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'Hind Siliguri', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(26,122,60,0.1); }
    .btn-login {
      width: 100%;
      background: var(--green);
      color: white;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-family: 'Hind Siliguri', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .btn-login:hover { background: var(--green-dark); }
    .btn-login:disabled { background: #aaa; cursor: not-allowed; }
    .error-msg {
      background: #fdecea;
      color: var(--red);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-text">Sh<span>u</span>khi Life</div>
      <div class="login-logo-sub">Admin Panel</div>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" id="username" class="form-input" placeholder="admin" autocomplete="username" />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') login()" />
    </div>
    <button class="btn-login" id="loginBtn" onclick="login()">Login</button>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('sl_admin_token')) {
      window.location.href = '/admin';
    }

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('errorMsg');
      errEl.style.display = 'none';

      if (!username || !password) {
        errEl.textContent = 'Username and password required';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Logging in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.success) {
          localStorage.setItem('sl_admin_token', data.token);
          localStorage.setItem('sl_admin_user', data.username);
          window.location.href = '/admin';
        } else {
          errEl.textContent = data.message || 'Invalid credentials';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Login';
        }
      } catch (e) {
        errEl.textContent = 'Server error. Please try again.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    }
  </script>
</body>
</html>
